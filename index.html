<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debt Review</title>
    <style>
        body {
            background-color: #fff; /* White background */
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            background-color: #1877F2; /* Facebook blue */
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
            max-width: 80%;
            width: 320px;
        }
        h1 {
            font-size: 27px;
            color: #fff;
            font-family: Arial, sans-serif;
            margin-bottom: 20px;
        }
        .button-container {
            margin-top: 30px;
            margin-bottom: 30px;
        }
        .button {
            background-color: #1877F2; /* Facebook blue */
            color: #fff; /* White text color */
            font-size: 20px;
            padding: 12px 24px;
            border: 2px solid #fff; /* White border */
            cursor: pointer;
            margin: 10px;
            border-radius: 5px;
            text-decoration: none;
            font-family: Arial, sans-serif;
        }
        .button:hover {
            background-color: #1659A5; /* Darker blue on hover */
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Is your debt over $15,000?</h1>
        <div class="button-container">
            <a class="button" href="https://blly.ink/debt">YES</a>
            <a class="button" href="https://blly.ink/loans1">NO</a>
        </div>
    </div>
</body>
</html>
